<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>funciones</title>
    <script>
        function mayor_edad(edad){
      let mayor = false;
        if (edad >= 18) 

            mayor = true;
         else 
            mayor = false;

            return mayor;   
        }

        function hello(name){
            alert("hello,welcome to my webpage " + name);
        }
        
        //ejemplo con valor 15
       console.log(mayor_edad(15));
    
       //ejemplo con valor 18
       console.log(mayor_edad(18));
       
     let name = prompt("ingresa tu nombre");
     hello(name); 

      let age = prompt("ingresa tu edad");
      if (mayor_edad(age)) {
        //mayor de edad permite ingreso
        alert("bienvenido");
      } else {
        //menor de edad restringe
        alert("no puedes ingresar a esta pagina");
      }

    </script>
</head>
