<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bucles</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <main>
        <script>
            // Bucle for

            console.log("Números del 1 al 10:");

            //mostrar los numeros del 1 al 10
            for (let i = 1; i <= 10; i++) {
                //  instrucciones que se repiten
                console.log(i);
            }

            //mostrar los numeros del 10 al 1

            console.log("Números del 10 al 1:");
            for (let i = 10; i >= 1; i--) {
                //  instrucciones que se repiten
                console.log(i);
            }

            //mostrar los numeros pares del 1 al 20
            console.log("Números pares del 1 al 20:");
            for (let i = 1; i <= 20; i++) {
                //  instrucciones que se repiten
                if (i % 2 === 0) {
                    console.log(i);
                }
            }

            console.log("Números pares del 1 al 20:");
            for (let i = 1; i <= 10; i++) {
                //  instrucciones que se repiten
                console.log(i * 2);
            }

            // Bucle while

            let numero = 5;

            console.log("10 primeros multiplos de 5");
            while (numero <= 50) {
                console.log(numero);
                numero += 5;
            }
            numero = 5;

            console.log("10 primeros multiplos de 5 utilizando do.. while");
            do {
                console.log(numero);
                numero += 5;
            } while (numero <= 50);

            //instrucciones de control

            console.log ("instrucciones de control break y continue");
            
            for(let j=0; j<=100; j++){

                if(j % 3 === 0) {
                    continue;//salta el siguiente iterador
                
                }
                console.log(j);
            
                if(j %  30 === 0) {
                  
                    break;//dettiene la ejecucion 
                }
            }


        </script>
    </main>

    <script src="../js/app.js"></script>
</body>

</html>
